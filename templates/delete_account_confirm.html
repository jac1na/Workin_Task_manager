{% extends 'base.html' %}

{% block content %}
<div class="form-container">
  <div class="form-card">
    <h2>Delete Account</h2>
    <p style="color:red;"><strong>Warning:</strong> This will permanently delete your account. This cannot be undone.</p>

    <form method="POST">
      {% csrf_token %}
      <button type="submit" style="background:red; color:white;">Yes, Delete My Account</button>
      <a href="{% url 'profile' %}"><button type="button">Cancel</button></a>
    </form>
  </div>
</div>
{% endblock %}
